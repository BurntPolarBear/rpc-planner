name: CI

# Runs the grade-math tests and a production build on every push and pull
# request to main, so a broken change is caught before it reaches Vercel.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run grade-math tests
        run: npm run test:grades

      - name: Run records-store tests
        run: npm run test:records

      - name: Build the app
        run: npm run build
